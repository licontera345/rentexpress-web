home.faq.q1 = Comment réserver un véhicule ?
home.faq.a1 = Créez votre compte, choisissez les dates et l'agence de retrait, sélectionnez votre voiture préférée puis confirmez le paiement sécurisé. Vous recevez la confirmation immédiatement.
home.faq.q2 = Quels documents présenter lors du retrait ?
home.faq.a2 = Présentez votre pièce d'identité, un permis de conduire en cours de validité et la carte utilisée pour la réservation. Les cartes supplémentaires des conducteurs additionnels sont acceptées.
home.faq.q3 = Puis-je modifier ou annuler ma réservation ?
home.faq.a3 = Oui. Depuis votre espace privé, changez les dates ou annulez sans frais jusqu'à 24 h avant le retrait. Pour toute urgence, contactez-nous par téléphone ou WhatsApp.

